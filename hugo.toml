baseURL = 'https://kacmazemin.github.io/evergreen/'
languageCode = 'en'
title = 'Evergreen'
enableEmoji = true

[module]
  [[module.imports]]
    path = "github.com/kaiiiz/hugo-theme-monochrome"

[pagination]
  pagerSize = 10

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  navbar_title = "Evergreen"
  hide_navbar_on_scroll = true
  footer = "Mehmet Emin Kaçmaz"
  author = "Mehmet Emin Kaçmaz"
  color_scheme = "dark"
  navbar_width = "wide"

  enable_zooming_js = true
  enable_header_anchor = true
  enable_toc = true
  enable_site_search = true
  enable_math = false

  enable_open_graph = true
  enable_twitter_cards = true

  enable_collapsible_toc = false
  toc_position = "right"

  [params.list_layout]
    enable_group_by_year = true
    enable_show_date = true
    enable_pagination = false

  [params.syntax_highlight]
    lib = "builtin"
    [params.syntax_highlight.builtin]
      enable_code_copy = true

[[menus.navbar]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 1

[[menus.navbar]]
  identifier = "notes"
  name = "Notes"
  url = "/notes/"
  weight = 2

[[menus.navbar]]
  identifier = "tech"
  name = "Tech"
  url = "/tech/"
  weight = 3

[markup]
  [markup.highlight]
    style = "monokai"
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
