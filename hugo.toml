baseURL = 'https://kacmazemin.github.io/evergreen/'
theme = "mana"
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

[outputs]
  home = ["HTML", "JSON"]

[taxonomies]
  tag = "tags"

[params]
  description = "A digital garden — notes, ideas, and technical references"
  author = "Mehmet Emin Kaçmaz"
  heroTitleLine1 = "EVERGREEN"
  heroTitleLine2 = "A Digital Garden"
  footerText = "Built with Hugo and Mana theme"

  [params.social]
    github = "https://github.com/kacmazemin"
    linkedin = "https://www.linkedin.com/in/kacmazemin"

  [params.buyMeACoffee]
    enabled = false

  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
    startYear = 2026
    owner = "Mehmet Emin Kaçmaz"

  [params.admonitions]
    alertStyle = "favicon"

[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 30

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 40
